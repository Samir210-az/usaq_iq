<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>UşaqIQ — Uşağınızın fərdi inkişaf planı</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563eb; --blue-d:#1d4ed8; --cream:#FBF3E7; --gold:#D2A55D;
  --teal:#2A9D8F; --bordo:#6A0000; --coral:#F4A261; --ink:#20232a; --ink-soft:#667085;
  --green:#16a34a; --red:#dc2626; --white:#fff;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Nunito',sans-serif; background:var(--cream); color:var(--ink); overflow-x:hidden;}
h1,h2,h3,.logo{font-family:'Baloo 2',sans-serif; font-weight:800;}
button{font-family:inherit; cursor:pointer; border:none;}
.app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--white); position:relative; display:flex; flex-direction:column;}
.topbar{display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid #eee;}
.back-btn{width:32px; height:32px; border-radius:50%; background:#f2f2f2; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;}
.logo{font-size:1.15rem; display:flex; align-items:center; gap:2px;}
.logo .l1{color:var(--ink);} .logo .l2{color:var(--blue); background:#eaf0ff; padding:2px 6px; border-radius:6px;}
.logo .l3{color:var(--coral); background:#fff1e8; padding:2px 6px; border-radius:6px;}
.logo .l4{color:var(--teal); background:#e6f7f5; padding:2px 6px; border-radius:6px;}
.stepper{display:flex; align-items:center; padding:14px 24px 4px; gap:6px;}
.dot{width:26px; height:26px; border-radius:50%; border:2px solid #d9dce3; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:800; color:#aab; background:#fff; flex-shrink:0; transition:all .3s;}
.dot.done{background:var(--blue); border-color:var(--blue); color:#fff;}
.dot.now{border-color:var(--blue); color:var(--blue);}
.line{flex:1; height:3px; background:#e3e6ec; border-radius:2px;}
.line.done{background:var(--blue);}
.step-label{text-align:center; font-size:.8rem; color:var(--ink-soft); font-weight:700; padding:6px 0 0;}

.screen{flex:1; display:flex; flex-direction:column; padding:26px 22px 22px; animation:fade .4s ease;}
@keyframes fade{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
.q-title{font-size:1.5rem; text-align:center; line-height:1.3; margin:20px 0 26px;}
.icon-3d{width:130px; height:130px; margin:6px auto 30px; border-radius:50%;
  background:radial-gradient(circle at 35% 28%, #ffffff, #eef2fb 55%, #d7e0f5 100%);
  display:flex; align-items:center; justify-content:center; font-size:3.8rem;
  box-shadow:0 22px 40px rgba(37,99,235,.22), inset 0 -10px 18px rgba(0,0,0,.06), inset 0 8px 14px rgba(255,255,255,.75);
  animation:icon3dFloat 3.2s ease-in-out infinite; transform-style:preserve-3d;}
@keyframes icon3dFloat{
  0%,100%{transform:translateY(0) rotate(-6deg) scale(1);}
  50%{transform:translateY(-14px) rotate(6deg) scale(1.06);}
}
.q-image{background:#fdf3ee; border-radius:18px; padding:24px; display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:26px;}
.shape{aspect-ratio:1; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:2.4rem;}
.answers-row{display:flex; gap:14px; margin-top:auto;}
.ans-btn{flex:1; padding:26px 10px; border-radius:16px; background:#f4f5f8; text-align:center; font-weight:800; font-size:1rem; transition:transform .15s ease, background .15s ease;}
.ans-btn:active{transform:scale(.96);}
.ans-btn .ic{font-size:1.6rem; display:block; margin-bottom:8px;}
.ans-no .ic{color:var(--red);} .ans-yes .ic{color:var(--green);}
.ans-btn:hover{background:#ebedf3;}

.age-grid, .gender-list{display:flex; flex-direction:column; gap:14px; margin-top:10px;}
.age-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.age-card{border:2px solid var(--blue); border-radius:16px; overflow:hidden; background:#fff; text-align:left;}
.age-card .thumb{height:120px; background:linear-gradient(135deg,#fde8d8,#e8f3fb); display:flex; align-items:center; justify-content:center; font-size:3rem;}
.age-card .lbl{background:var(--blue); color:#fff; padding:12px; font-weight:800; display:flex; justify-content:space-between; align-items:center;}
.gender-opt{display:flex; align-items:center; gap:14px; background:#f4f5f8; padding:18px; border-radius:14px; font-weight:800; font-size:1.05rem;}
.gender-opt .ic{font-size:1.6rem;}

.info-banner{background:#e8f1fd; border-radius:16px; padding:16px; display:flex; gap:14px; align-items:center; margin-bottom:22px;}
.info-banner .ic{font-size:2rem;}
.info-banner p{font-weight:700; font-size:.92rem;}

.headline{font-size:1.5rem; text-align:center; margin-bottom:10px;}
.sub{color:var(--ink-soft); font-weight:700; text-align:center; font-size:.92rem; margin-bottom:22px;}

.skill-card{background:var(--cream); border-radius:18px; padding:22px; margin-bottom:20px;}
.skill-row{margin-bottom:16px;}
.skill-row:last-child{margin-bottom:0;}
.skill-lbl{display:flex; justify-content:space-between; font-weight:800; font-size:.88rem; margin-bottom:6px;}
.skill-track{background:#e6e2da; border-radius:999px; height:12px; overflow:hidden;}
.skill-fill{height:100%; border-radius:999px; width:0%; transition:width 1.2s cubic-bezier(.2,.9,.3,1);}
.skill-fill.in{width:var(--w);}
.c1{background:var(--coral);} .c2{background:var(--teal);} .c3{background:#d63384;} .c4{background:#8b5cf6;}
.c5{background:#e11d48;} .c6{background:var(--green);} .c7{background:var(--blue);}

.big-btn{background:var(--blue); color:#fff; padding:18px; border-radius:14px; font-weight:800; font-size:1.05rem; width:100%; box-shadow:0 8px 20px rgba(37,99,235,.28); transition:transform .2s;}
.big-btn:active{transform:scale(.98);}
.big-btn.outline{background:#fff; border:2px solid var(--blue); color:var(--blue); box-shadow:none;}

.overlay{position:fixed; inset:0; background:rgba(20,22,28,.55); display:flex; align-items:center; justify-content:center; z-index:80; padding:24px;}
.overlay-card{background:#fff; border-radius:20px; padding:30px 24px; text-align:center; max-width:380px;}
.overlay-card h3{font-size:1.2rem; margin-bottom:22px; line-height:1.3;}
.overlay-answers{display:flex; gap:20px; justify-content:center;}
.overlay-circle{width:70px; height:70px; border-radius:50%; background:#f4f5f8; display:flex; align-items:center; justify-content:center; font-size:1.6rem;}

.progress-fake{background:var(--cream); border-radius:16px; padding:22px; text-align:center;}
.spinner{width:44px; height:44px; border:4px solid #e6e2da; border-top-color:var(--blue); border-radius:50%; margin:0 auto 16px; animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.split-img{border-radius:16px; overflow:hidden; display:grid; grid-template-columns:1fr 1fr; margin-bottom:18px;}
.split-half{aspect-ratio:3/4; display:flex; align-items:flex-end; padding:16px; color:#fff; font-weight:800; font-size:.95rem; text-align:center;}
.split-half.bad{background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(90,20,20,.75)),radial-gradient(circle at 40% 20%, #f4b8a0, #d97a5a);}
.split-half.good{background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(20,60,50,.75)),radial-gradient(circle at 60% 20%, #a0e0d0, #4fae9a);}

.counter-box{display:flex; align-items:center; gap:10px; background:#f4f5f8; padding:12px 16px; border-radius:12px; font-weight:800; font-size:.92rem; margin-top:16px;}
.counter-box .num{color:var(--blue); font-size:1.1rem;}

.feature-emoji{background:linear-gradient(135deg,#e8f7f4,#e8f1fd); border-radius:50%; width:200px; height:130px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center; font-size:3.2rem; position:relative;}
.bullet-list{list-style:none; margin-bottom:24px;}
.bullet-list li{padding:10px 0; font-weight:700; font-size:.95rem; display:flex; gap:10px; align-items:flex-start;}
.bullet-list li::before{content:"✓"; color:var(--green); font-weight:900; flex-shrink:0;}

.chart-box{background:var(--cream); border-radius:18px; padding:24px 16px; margin-bottom:22px; position:relative; height:180px;}
.chart-svg{width:100%; height:100%;}
.chart-lbl{display:flex; justify-content:space-between; font-size:.8rem; font-weight:800; color:var(--ink-soft); margin-top:6px;}

.stars{color:#f5b400; font-size:1.1rem; letter-spacing:2px; margin-bottom:8px;}
.review-card{background:var(--cream); border-radius:14px; padding:16px; margin-bottom:14px;}
.review-head{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.avatar{width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--teal),var(--blue)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800;}
.review-name{font-weight:800; font-size:.9rem;}
.review-txt{font-size:.86rem; font-weight:600; color:#444;}

.rating-cards{display:flex; gap:12px; margin-bottom:20px;}
.rating-card{flex:1; background:var(--cream); border-radius:14px; padding:16px; text-align:center;}
.rating-card .num{font-size:1.5rem; font-weight:800; color:var(--green);}

.get-tag{color:var(--blue); font-weight:800; font-size:.85rem; margin-bottom:6px;}

.expert-card{background:#e8f1fd; border-radius:18px; padding:22px; margin-bottom:20px; position:relative;}
.expert-card .quote{font-size:2.2rem; color:var(--blue); opacity:.4; line-height:0;}
.expert-card p{font-weight:700; font-size:.98rem; margin:10px 0 18px;}
.expert-who{display:flex; align-items:center; gap:12px;}
.expert-who .av{width:48px; height:48px; border-radius:50%; background:#ccd; }
.expert-who b{font-size:.92rem;} .expert-who span{font-size:.8rem; color:var(--ink-soft); font-weight:700;}

.email-input{width:100%; padding:16px; border:2px solid #e3e6ec; border-radius:12px; font-size:1rem; margin-bottom:14px; font-family:inherit;}
.email-input:focus{outline:none; border-color:var(--blue);}
.privacy{font-size:.78rem; color:var(--ink-soft); font-weight:600; line-height:1.5; margin-bottom:24px; display:flex; gap:8px;}

/* PRICING */
.timer-bar{display:flex; justify-content:space-between; align-items:center; background:#fff; padding:14px 20px; border-bottom:1px solid #eee;}
.timer-bar .t-label{font-size:.75rem; color:var(--ink-soft); font-weight:700;}
.timer-bar .t-time{font-size:1.4rem; font-weight:800; color:var(--blue);}
.timer-bar .choose-btn{background:var(--blue); color:#fff; padding:12px 18px; border-radius:12px; font-weight:800; font-size:.85rem;}
.price-head{font-size:1.4rem; text-align:center; padding:22px 22px 6px; line-height:1.35;}
.price-head .green{color:var(--green);}
.promo-box{background:#fde9e9; border-radius:14px; padding:16px; margin:16px 22px; display:flex; justify-content:space-between; align-items:center; gap:12px; position:relative;}
.promo-tag{position:absolute; top:-10px; right:14px; background:var(--red); color:#fff; font-weight:800; font-size:.8rem; padding:5px 12px; border-radius:8px 8px 8px 0;}
.promo-code{background:#fff; border-radius:10px; padding:10px 14px; font-weight:800; flex:1; font-size:.9rem;}
.promo-timer{text-align:center; font-size:.75rem; font-weight:800; color:var(--red);}
.plans{padding:6px 22px 0; display:flex; flex-direction:column; gap:12px;}
.plan{border:2px solid #e3e6ec; border-radius:14px; padding:16px; display:flex; justify-content:space-between; align-items:center; position:relative;}
.plan.active{border-color:var(--blue); background:#f3f7ff;}
.plan-tag{position:absolute; top:-11px; left:16px; background:var(--blue); color:#fff; font-size:.7rem; font-weight:800; padding:4px 10px; border-radius:6px;}
.radio{width:22px; height:22px; border-radius:50%; border:2px solid #ccc; margin-right:14px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
.radio.on{border-color:var(--blue); background:var(--blue);}
.radio.on::after{content:""; width:8px; height:8px; background:#fff; border-radius:50%;}
.plan-name{font-weight:800; font-size:.98rem;}
.plan-old{color:#aaa; text-decoration:line-through; font-size:.85rem;}
.plan-new{font-weight:800; font-size:1.05rem;}
.off-badge{background:#fde3e3; color:var(--red); font-size:.72rem; font-weight:800; padding:3px 8px; border-radius:6px; margin-top:4px; display:inline-block;}
.get-plan-btn{margin:20px 22px 8px;}

footer{background:var(--ink); color:rgba(255,255,255,.6); text-align:center; padding:18px 20px; font-size:.78rem; font-weight:700; line-height:1.8;}
/* ===== RƏNGLƏMƏ MODULU ===== */
.color-gallery{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px;}
.color-thumb{border:2px solid #e6e2da; border-radius:16px; background:#fff; padding:10px; text-align:center; transition:transform .15s;}
.color-thumb:active{transform:scale(.96);}
.color-thumb svg{width:100%; height:90px;}
.color-thumb .name{font-weight:800; font-size:.85rem; margin-top:6px;}
.palette-row{display:flex; gap:10px; overflow-x:auto; padding:12px 4px; margin-bottom:6px;}
.swatch{width:38px; height:38px; border-radius:50%; flex-shrink:0; border:3px solid transparent; box-shadow:0 2px 6px rgba(0,0,0,.15); transition:transform .15s;}
.swatch.active{border-color:var(--ink); transform:scale(1.15);}
.coloring-stage{background:#fff; border-radius:18px; border:1px solid #eee; padding:12px; margin-bottom:14px;}
.coloring-stage svg{width:100%; height:auto; max-height:52vh;}
.color-region{cursor:pointer; stroke:#2b2118; stroke-width:3; stroke-linejoin:round;}
.app{padding-bottom:66px;}
.tab-bar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); max-width:480px; width:100%; display:flex; background:#fff; border-top:1px solid #e6e6e6; box-shadow:0 -6px 20px rgba(0,0,0,.06); z-index:100;}
.tab-item{flex:1; text-align:center; padding:11px 0 9px; font-weight:800; font-size:.78rem; color:var(--ink-soft); transition:color .2s;}
.tab-item .ic{display:block; font-size:1.35rem; margin-bottom:2px; transition:transform .2s;}
.tab-item.active{color:var(--blue);}
.tab-item.active .ic{transform:translateY(-3px) scale(1.15);}
.tab-item:active .ic{transform:scale(.85);}
footer a{color:var(--gold);}

/* ===== GAMES MODULE CSS ===== */

:root{
  --blue:#2563eb; --cream:#FBF3E7; --gold:#D2A55D; --teal:#2A9D8F;
  --bordo:#6A0000; --coral:#F4A261; --ink:#20232a; --ink-soft:#667085;
  --green:#16a34a; --red:#dc2626; --purple:#8b5cf6; --pink:#d63384;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none;}
body{font-family:'Nunito',sans-serif; background:var(--cream); color:var(--ink); overflow-x:hidden;}
h1,h2,.logo{font-family:'Baloo 2',sans-serif; font-weight:800;}
button{font-family:inherit; cursor:pointer; border:none;}




.score-pill{margin-left:auto; background:var(--gold); color:#fff; font-weight:800; font-size:.85rem; padding:6px 14px; border-radius:999px;}


 to{opacity:1; transform:translateY(0);}}

.hub-title{text-align:center; font-size:1.5rem; margin:10px 0 4px;}
.hub-sub{text-align:center; color:var(--ink-soft); font-weight:700; font-size:.9rem; margin-bottom:24px;}
.game-grid{display:flex; flex-direction:column; gap:14px;}
.game-card{display:flex; align-items:center; gap:16px; background:var(--cream); border-radius:18px; padding:16px; border:2px solid transparent; transition:transform .2s;}
.game-card:active{transform:scale(.97);}
.game-ic{width:60px; height:60px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:1.8rem; flex-shrink:0;}
.game-info{flex:1; text-align:left;}
.game-info b{font-size:1rem; display:block;}
.game-info span{font-size:.78rem; color:var(--ink-soft); font-weight:700;}
.game-best{font-size:.75rem; font-weight:800; color:var(--gold);}
.tier-sq-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
.tier-square{border:2px solid var(--blue); border-radius:16px; overflow:hidden; background:#fff; text-align:center; transition:transform .15s;}
.tier-square:active{transform:scale(.96);}
.tier-square .thumb{height:64px; background:linear-gradient(135deg,#fde8d8,#e8f3fb); display:flex; align-items:center; justify-content:center; font-size:1.8rem;}
.tier-square .lbl{background:var(--blue); color:#fff; padding:9px 6px; font-weight:800; font-size:.78rem;}
.tier-square.active{border-color:var(--bordo,#6A0000);}
.tier-square.active .lbl{background:var(--bordo,#6A0000);}

.game-sq-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.game-square{border:2px solid var(--blue); border-radius:16px; overflow:hidden; background:#fff; text-align:center; transition:transform .15s;}
.game-square:active{transform:scale(.96);}
.game-square .thumb{height:90px; display:flex; align-items:center; justify-content:center; font-size:2.3rem;}
.game-square .lbl{background:var(--blue); color:#fff; padding:10px 8px 6px; font-weight:800; font-size:.85rem; line-height:1.3;}
.game-square .domain-tag{display:block; font-size:.68rem; font-weight:700; opacity:.85; margin-top:2px;}
.game-square .best{background:var(--blue); color:var(--gold); font-size:.72rem; font-weight:800; padding:0 0 10px;}
.qtimer{height:8px; background:#eee; border-radius:999px; overflow:hidden; margin:-14px 0 22px;}
.qtimer-fill{height:100%; width:100%; background:linear-gradient(90deg,#16a34a,#f59e0b,#dc2626); transition:width .1s linear;}
.mole-grid{display:grid; gap:8px; margin-top:6px;}
.mole-cell{aspect-ratio:1; border-radius:14px; background:var(--cream); display:flex; align-items:center; justify-content:center; font-size:1.8rem; transition:transform .1s;}
.mole-cell.pop{transform:scale(1.1); box-shadow:0 6px 16px rgba(0,0,0,.12);}
.mole-hud{display:flex; justify-content:space-between; font-weight:800; font-size:.85rem; margin-bottom:10px; color:var(--ink-soft);}

.round-lbl{text-align:center; font-size:.82rem; font-weight:800; color:var(--ink-soft); margin-bottom:6px;}
.big-emoji{font-size:5.5rem; text-align:center; margin:14px 0 26px; animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-10px) rotate(3deg);}}
.opt-grid{display:flex; flex-direction:column; gap:12px; margin-top:auto;}
.opt-btn{padding:18px; border-radius:14px; background:var(--cream); font-weight:800; font-size:1.05rem; transition:transform .15s;}
.opt-btn:active{transform:scale(.96);}
.opt-btn.correct{background:#dcfce7; color:var(--green); border:2px solid var(--green);}
.opt-btn.wrong{background:#fde3e3; color:var(--red); border:2px solid var(--red); animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);}}

.end-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px;}
.end-stars{font-size:3rem; margin-bottom:14px;}
.end-title{font-size:1.4rem; margin-bottom:8px;}
.end-sub{color:var(--ink-soft); font-weight:700; margin-bottom:28px;}

.outline-btn{background:#fff; border:2px solid var(--blue); color:var(--blue); padding:14px 32px; border-radius:14px; font-weight:800; font-size:.95rem; margin-top:10px; width:100%; max-width:280px;}

.balloon-area{flex:1; position:relative; background:linear-gradient(180deg,#dbeafe,#eff6ff); border-radius:18px; overflow:hidden; margin-bottom:14px;}
.balloon{position:absolute; width:52px; height:64px; border-radius:50% 50% 50% 50%/60% 60% 40% 40%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; cursor:pointer; box-shadow:inset -6px -6px 10px rgba(0,0,0,.1);}
.timer-hud{display:flex; justify-content:space-between; font-weight:800; padding:0 4px 10px; font-size:.9rem;}

.memory-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:6px;}
.mem-card{aspect-ratio:1; border-radius:12px; background:var(--blue); display:flex; align-items:center; justify-content:center; font-size:1.7rem; transition:transform .3s; cursor:pointer;}
.mem-card.flipped{background:#fff; border:2px solid var(--gold);}
.mem-card.matched{background:#dcfce7; border:2px solid var(--green); opacity:.7;}
.mem-hud{display:flex; justify-content:space-between; font-weight:800; font-size:.85rem; margin-bottom:10px; color:var(--ink-soft);}

.seq-target{display:flex; gap:8px; justify-content:center; margin-bottom:24px; min-height:70px;}
.seq-slot{width:60px; height:60px; border-radius:12px; background:var(--cream); border:2px dashed #ccc; display:flex; align-items:center; justify-content:center; font-size:1.8rem;}
.seq-slot.filled{border-style:solid; border-color:var(--green); background:#dcfce7;}
.seq-pool{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
.seq-tile{background:var(--cream); border-radius:14px; padding:16px; display:flex; flex-direction:column; align-items:center; gap:6px; font-weight:800; font-size:.85rem; transition:transform .15s;}

function render(){
  if(appMode==='games'){ renderGamesApp(); return; }
  if(appMode==='coloring'){ renderColoringApp(); return; }
  const app = document.getElementById('app');
  app.innerHTML = '';
  const s = state.screen;

  const wrap = document.createElement('div');
  wrap.style.display='flex'; wrap.style.flexDirection='column'; wrap.style.flex='1';

  // TOPBAR
  const top = document.createElement('div');
  top.className='topbar';
  top.innerHTML = `${s>0?'<div class="back-btn" onclick="goBack()">←</div>':''}
    <div class="logo"><span class="l1">Uşaq</span><span class="l2">I</span><span class="l3">Q</span><span class="l4">•</span></div>`;
  wrap.appendChild(top);

  // STEPPER (only during quiz phase, screens 2..2+QUIZ_LEN-1)
  const quizStart=2, quizEnd = quizStart+QUIZ_LEN-1;
  const currentSet = QUESTION_SETS[state.age] || QUESTION_SETS['1–2'];
  if(s>=quizStart && s<=quizEnd){
    const qIdx = s-quizStart;
    const totalSteps = 5;
    const activeStep = Math.min(totalSteps-1, Math.floor(qIdx/(QUIZ_LEN/totalSteps)));
    const st = document.createElement('div'); st.className='stepper';
    for(let i=0;i<totalSteps;i++){
      const d=document.createElement('div');
      d.className='dot'+(i<activeStep?' done':(i===activeStep?' now':''));
      d.innerText = i<activeStep?'✓':'';
      st.appendChild(d);
      if(i<totalSteps-1){const l=document.createElement('div'); l.className='line'+(i<activeStep?' done':''); st.appendChild(l);}
    }
    wrap.appendChild(st);
    const lbl=document.createElement('div'); lbl.className='step-label';
    lbl.innerText = currentSet[qIdx].domain + ` · ${qIdx+1}/${QUIZ_LEN}`;
    wrap.appendChild(lbl);
  }

  const scr = document.createElement('div');
  scr.className='screen';

  // ===== SCREEN ROUTER =====
  if(s===0){ scr.appendChild(screenAge()); }
  else if(s===1){ scr.appendChild(screenGender()); }
  else if(s>=quizStart && s<=quizEnd){ scr.appendChild(screenQuiz(s-quizStart, currentSet)); }
  else if(s===quizEnd+1){ scr.appendChild(screenAnalysis()); }
  else if(s===quizEnd+2){ scr.appendChild(screenCreating()); }
  else if(s===quizEnd+3){ scr.appendChild(screenEmail()); }
  else if(s===quizEnd+4){ scr.appendChild(screenHowItWorks()); }
  else if(s===quizEnd+5){ scr.appendChild(screenGrowthChart()); }
  else if(s===quizEnd+6){ scr.appendChild(screenStressFree()); }
  else if(s===quizEnd+7){ scr.appendChild(screenKidsLove()); }
  else if(s===quizEnd+8){ scr.appendChild(screenGet1()); }
  else if(s===quizEnd+9){ scr.appendChild(screenGet2()); }
  else if(s===quizEnd+10){ scr.appendChild(screenGet3()); }
  else if(s===quizEnd+11){ scr.appendChild(screenReviews()); }
  else if(s===quizEnd+12){ scr.appendChild(screenExpert()); }
  else if(s===quizEnd+13){ scr.appendChild(screenThemes()); }
  else if(s===quizEnd+14){ scr.appendChild(screenCertified()); }
  else { app.innerHTML=''; app.appendChild(screenReport()); appendFooter(app); appendTabBar(app); return; }

  wrap.appendChild(scr);
  const f=document.createElement('footer');
  f.style.marginTop='auto';
  f.innerHTML = `<a href="https://instagram.com/s_akhundoff" target="_blank" style="color:inherit; text-decoration:none;">By <strong style="color:var(--gold);">s_akhundoff</strong> 📷</a><br><span style="font-size:.7rem; opacity:.7;">© 2026 Bütün hüquqlar qorunur.</span>`;
  wrap.appendChild(f);
  app.appendChild(wrap);
  appendTabBar(app);

  requestAnimationFrame(()=>{
    document.querySelectorAll('.skill-fill').forEach(f=>{ f.style.setProperty('--w', f.dataset.w+'%'); f.classList.add('in'); });
  });
}

  const idx = state.answers.length;

function computeScores(){
  const totals = {}, yes = {};
  DOMAIN_ORDER.forEach(d=>{ totals[d]=0; yes[d]=0; });
  state.answers.forEach(a=>{ totals[a.domain]=(totals[a.domain]||0)+1; if(a.v) yes[a.domain]=(yes[a.domain]||0)+1; });
  const scores = {};
  DOMAIN_ORDER.forEach(d=>{ scores[d] = totals[d] ? Math.round(yes[d]/totals[d]*100) : 60; });
  return scores;
}

function getMax(key){
  const td = currentTierData();
  if(key==='soz') return td.words.length;
  if(key==='hiss') return td.emotions.length;
  if(key==='yaddas') return td.memory.length*2;
  if(key==='seher') return td.sequences.reduce((s,seq)=>s+seq.length,0);
  if(key==='cumle') return td.cumle.length;
  if(key==='sirasi') return td.sirasi.length;
  if(key==='secim') return td.secim.length;
  if(key==='esya') return td.esya.length;
  if(key==='teztap') return td.teztap.rounds;
  return null;
}
function tierGetBest(key){ return localStorage.getItem('usaqiq_best_'+key+'_'+gameTier) || 0; }
function tierSetBest(key, val){ const cur=+tierGetBest(key); if(val>cur) localStorage.setItem('usaqiq_best_'+key+'_'+gameTier, val); }

let __qTimerInterval = null;
function armQuestionTimer(expireCallback){
  clearInterval(__qTimerInterval);
  const td = currentTierData();
  if(!td.timed) return;
  const totalTenths = td.timerSeconds*10;
  let remaining = totalTenths;
  __qTimerInterval = setInterval(()=>{
    remaining--;
    const fill = document.getElementById('qtimerFill');
    if(fill) fill.style.width = Math.max(0,(remaining/totalTenths*100))+'%';
    if(remaining<=0){ clearInterval(__qTimerInterval); expireCallback(); }
  }, 100);
}
function disarmQuestionTimer(){ clearInterval(__qTimerInterval); }
function timerBarHTML(){ return currentTierData().timed ? `<div class="qtimer"><div class="qtimer-fill" id="qtimerFill"></div></div>` : ''; }

const TIER_EMOJI = {toddler:'🎨', core:'🧸', advanced:'🔤'};
function renderHome(){
  const d = document.createElement('div');
  d.innerHTML = `<h1 class="hub-title">🎮 Oyun Mərkəzi</h1>
  <p class="hub-sub">Yaş qrupunu seç, oyunlar ona uyğunlaşacaq</p>
  <div class="tier-sq-grid" id="tierRow"></div>
  <div class="game-sq-grid" id="gameGrid" style="margin-top:22px;"></div>`;

  const tierRow = d.querySelector('#tierRow');
  Object.entries(TIER_DATA).forEach(([tk,td])=>{
    const b = document.createElement('div');
    b.className = 'tier-square'+(gameTier===tk?' active':'');
    b.onclick = ()=>{ gameTier=tk; gameTierManual=true; renderGamesApp(); };
    b.innerHTML = `<div class="thumb">${TIER_EMOJI[tk]}</div><div class="lbl">${td.label}</div>`;
    tierRow.appendChild(b);
  });

  const grid = d.querySelector('#gameGrid');
  Object.entries(GAMES).forEach(([key,g])=>{
    const max = getMax(key);
    const card = document.createElement('div');
    card.className='game-square';
    card.onclick = ()=>startGame(key);
    card.innerHTML = `<div class="thumb" style="background:${g.color};">${g.ic}</div>
      <div class="lbl">${g.title}<span class="domain-tag">${g.domain}</span></div>
      <div class="best">🏆 ${tierGetBest(key)}${max?'/'+max:''}</div>`;
    grid.appendChild(card);
  });
  return d;
}

function startGame(key){
  score = 0;
  if(key==='soz') startWordGame();
  else if(key==='balon') startBalloonGame();
  else if(key==='yaddas') startMemoryGame();
  else if(key==='hiss') startEmotionGame();
  else if(key==='seher') startSeqGame();
  else if(key==='cumle') startCumleGame();
  else if(key==='teztap') startTezTapGame();
  else if(key==='sirasi') startSirasiGame();
  else if(key==='secim') startSecimGame();

let memCards=[], memFlipped=[], memMoves=0, memMatched=0, memPairCount=6;
function startMemoryGame(){
  const set = currentTierData().memory;
  memPairCount = set.length;
  const pairs = shuffle([...set, ...set]).map((e,i)=>({id:i, e, flipped:false, matched:false}));
  memCards = pairs; memFlipped=[]; memMoves=0; memMatched=0;
  gameView='yaddas-play'; renderGamesApp();
}
function renderMemoryGame(){
  const d=document.createElement('div');
  d.innerHTML = `<div class="mem-hud"><span>🔄 Hərəkət: ${memMoves}</span><span>✅ ${memMatched}/${memPairCount}</span></div>
  <div class="memory-grid" id="memGrid">
    ${memCards.map(c=>`<div class="mem-card ${c.flipped?'flipped':''} ${c.matched?'matched':''}" onclick="flipCard(${c.id})">${c.flipped||c.matched?c.e:'❓'}</div>`).join('')}
  </div>`;
  return d;
}
function flipCard(id){
  const card = memCards.find(c=>c.id===id);
  if(card.flipped || card.matched || memFlipped.length>=2) return;
  card.flipped = true; memFlipped.push(card);
  renderGamesApp();
  if(memFlipped.length===2){
    memMoves++;
    if(memFlipped[0].e === memFlipped[1].e){
      memFlipped.forEach(c=>c.matched=true);
      memMatched++;
      memFlipped=[];
      if(memMatched===memPairCount){
        score = Math.max(0, memPairCount*4 - memMoves*2);
        setTimeout(()=>{ tierSetBest('yaddas',score); gameView='yaddas-end'; renderGamesApp(); }, 500);
      } else { renderGamesApp(); }
    } else {
      setTimeout(()=>{ memFlipped.forEach(c=>c.flipped=false); memFlipped=[]; renderGamesApp(); }, 800);
    }
  }
}

  const targetIdx = Math.floor(Math.random()*cfg.grid);

    cell.className = 'mole-cell';
    if(i===targetIdx){
      cell.innerText = cfg.target;
      cell.onclick = ()=>{ clearTimeout(teztapTimer); score++; cell.classList.add('pop'); advanceMoleRound(); };
    } else {
      cell.innerText = cfg.decoys[Math.floor(Math.random()*cfg.decoys.length)];
    }
    grid.appendChild(cell);
  }
  clearTimeout(teztapTimer);
  teztapTimer = setTimeout(()=>{ teztapMisses++; advanceMoleRound(); }, cfg.duration);
}
function advanceMoleRound(){
  teztapRound++;
  const cfg = currentTierData().teztap;
  if(teztapRound>=cfg.rounds){
    tierSetBest('teztap', score);
    gameView='teztap-end';

    setTimeout(()=>runMoleRound(), 250);

let seqRound=0, seqCurrent=[], seqPlaced=[], seqTiles=[], seqMistakes=0;
function startSeqGame(){ seqRound=0; seqMistakes=0; nextSequence(); gameView='seher-play'; renderGamesApp(); }
function nextSequence(){
  const seqs = currentTierData().sequences;
  seqCurrent = seqs[seqRound % seqs.length];
  seqPlaced = [];
  seqTiles = shuffle(seqCurrent.map((s,i)=>({...s, origIdx:i, used:false})));
}
function renderSeqGame(){
  const seqs = currentTierData().sequences;
  const d=document.createElement('div');
  d.innerHTML = `<div class="round-lbl">Ardıcıllıq ${seqRound+1}/${seqs.length} — düzgün sırayla toxun ${seqMistakes?`· ❌ ${seqMistakes} səhv`:''}</div>
  <div class="seq-target" id="seqTarget">
    ${seqCurrent.map((s,i)=>`<div class="seq-slot ${seqPlaced[i]?'filled':''}">${seqPlaced[i]?seqPlaced[i].ic:''}</div>`).join('')}
  </div>
  <div class="seq-pool" id="seqPool">
    ${seqTiles.map((t,i)=>`<div class="seq-tile ${t.used?'used':''}" onclick="tapSeq(${i})"><span class="e">${t.ic}</span><span>${t.label}</span></div>`).join('')}
  </div>`;
  return d;
}
function tapSeq(idx){
  const tile = seqTiles[idx];
  if(tile.used) return;
  const nextExpected = seqPlaced.length;
  if(tile.origIdx === nextExpected){
    tile.used = true;
    seqPlaced.push(tile);
    score++;
    if(seqPlaced.length === seqCurrent.length){
      setTimeout(()=>{
        seqRound++;
        const seqs = currentTierData().sequences;
        if(seqRound >= seqs.length){
          score = Math.max(0, score - seqMistakes);
          tierSetBest('seher',score); gameView='seher-end'; renderGamesApp();
        }
        else { nextSequence(); renderGamesApp(); }
      }, 700);
    }
  } else {
    seqMistakes++;
    const el = document.querySelectorAll('#seqPool .seq-tile')[idx];
    if(el){ el.classList.add('wrong'); setTimeout(()=>el.classList.remove('wrong'), 300); }
  }
  renderGamesApp();
}

function svgTag(region, fillOverride){
  const attrs = region.attrs;
  const attrStr = Object.entries(attrs).map(([k,v])=>`${k}="${v}"`).join(' ');
  const fill = fillOverride || coloringFills[region.id] || '#fdf6ec';
  const clickable = fillOverride ? '' : `onclick="fillColoringRegion('${region.id}')" class="color-region"`;
  return `<${region.tag} ${attrStr} fill="${fill}" stroke="#2b2118" stroke-width="3" ${clickable}></${region.tag}>`;
}

  renderColoringApp();
}
function coloringBackToGallery(){ coloringView='gallery'; renderColoringApp(); }

function renderColoringCanvas(){
  const tpl = COLORING_TEMPLATES[coloringTemplateIdx];
  const d=document.createElement('div');
  d.innerHTML = `<h2 style="text-align:center; font-size:1.15rem; margin-bottom:6px;">${tpl.name}</h2>
  <div class="palette-row" id="paletteRow"></div>
  <div class="coloring-stage">
    <svg viewBox="${tpl.viewBox}" id="colSvg">${tpl.regions.map(r=>svgTag(r)).join('')}</svg>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="big-btn outline" style="flex:1;" onclick="resetColoringTemplate()">🔄 Təmizlə</button>
    <button class="big-btn" style="flex:1;" onclick="coloringBackToGallery()">✅ Bitdi</button>
  </div>`;
  const paletteRow = d.querySelector('#paletteRow');
  PALETTE.forEach(c=>{
    const sw = document.createElement('div');
    sw.className = 'swatch'+(coloringColor===c?' active':'');
    sw.style.background = c;
    if(c==='#ffffff') sw.style.border = coloringColor===c ? '3px solid var(--ink)' : '2px solid #ccc';
    sw.onclick = ()=>{ coloringColor=c; renderColoringApp(); };
    paletteRow.appendChild(sw);
  });
  return d;
}

function fillColoringRegion(id){
  coloringFills[id] = coloringColor;
  const el = document.querySelector(`#colSvg [onclick*="${id}'"]`);
  if(el) el.setAttribute('fill', coloringColor);
}
function resetColoringTemplate(){ coloringFills = {}; renderColoringApp(); }

render();
</script>
</body>
</html>
